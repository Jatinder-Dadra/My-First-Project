<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JD Coffee Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--header / navbar-->
    <header>
        <div class="nav-container">
            <div class="nav-logo">
                <div class="logo">
                    ☕ Coffee
                </div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#home" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="#about" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="#service" class="nav-link">Service</a>
                </li>
                <li class="nav-item">
                    <a href="#portfolio" class="nav-link">Portfolio</a>
                </li>
                <li class="nav-item">
                    <a href="#blog" class="nav-link">Blog</a>
                </li>
            </ul>
            
            <div class="logo">
                    🛒
            </div>
        </div>

        <div class="hero-section">
            <div class="center-content">
                <h1>The best quality coffee beans<br>for the best coffee brew</h1>
                <p>A cup is enough to give you energy<br>all day long</p>
                <button class="section-order">Order Now</button>
            </div>
            <div class="side-image cup">
                <img src="image/pngegg (63).png" alt="coffee cup">
            </div>
        </div>
        
    </header>
    <section class="product-section" id="Service">
        <div class="product-header">
            <h2 class="section-title">Product</h2>
            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="search...">
                </div>
                <button class="filter-btn active">←</button>
                <button class="filter-btn">→</button>
            </div>
        </div>
        <div class="product-grid"></div>
    </section>
    <footer>
        <div class=""></div>
    </footer>
    
</body>
</html>
