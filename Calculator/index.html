<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width , initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
            input[type="button"]{
                width: 100%;
                height: 100%;
            }
             body{
                background-color: rgb(230, 228, 228);
                position: absolute;
                left: 400px;
                top: 30px;
            }
            table tr, th{
                background-color: rgb(49, 224, 40);
                border: none; 
                border-radius: 3px;
                box-shadow: 0 4px 8px rgb(0, 0, 0, 0.5);
            }
            table{
                background-color: black;
                border: 2px solid black;
                border-radius: 10px;
                width: 100px;
                height: 150px;
            }
        </style>
    </head>
    <body>

         <table>
            <tr>
                <th colspan="3"><input type="text" id="a"></th>
                <th><input type="button" value="c" onclick="cal()" style="background-color: rgb(231, 33, 7); color: white;"></th>
            </tr>
            <tr>
                <th><input type="button" value="1" onclick="pick(1)"></th>
                <th><input type="button" value="2" onclick="pick(2)"></th>
                <th><input type="button" value="3" onclick="pick(3)"></th>
                <th><input type="button" value="/" onclick="pick('/')" style="background-color: rgb(231, 92, 17); color: white;"></th>
            </tr>
            <tr>
                <th><input type="button" value="4" onclick="pick(4)"></th>
                <th><input type="button" value="5" onclick="pick(5)"></th>
                <th><input type="button" value="6" onclick="pick(6)"></th>
                <th><input type="button" value="*" onclick="pick('*')" style="background-color: rgb(231, 92, 17);
                 color: white;"></th>
            </tr>

            <tr>
                <th><input type="button" value="7" onclick="pick(7)"></th>
                <th><input type="button" value="8" onclick="pick(8)"></th>
                <th><input type="button" value="9" onclick="pick(9)"></th>
                <th><input type="button" value="-" onclick="pick('-')" style="background-color: rgb(231, 92, 17); color: white;"></th>
            </tr>
            <tr>
                <th><input type="button" value="." onclick="pick('.')"></th>
                <th><input type="button" value="0" onclick="pick(0)"></th>
                <th><input type="button" value="=" onclick="solve()" style="background-color: rgb(231, 92, 17); color: white;"></th>
                <th><input type="button" value="+" onclick="pick('+')" style="background-color: rgb(231, 92, 17);color: white;"></th>
            </tr>
        </table>

        <script>
                function pick(val)
                {
                    document.getElementById("a").value +=val;
                }

                function cal()
                {
                    document.getElementById("a").value=" ";
                }

                function solve()
                {
                   var x= document.getElementById("a").value;
                   var y=eval(x);
                   document.getElementById("a").value=y;
                }
                
            </script>
   </body>
</html>
